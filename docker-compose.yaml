services:
  angular-app:
    build: .
    container_name: angular-app
    ports:
      - "8082:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - centinela-net

networks:
  centinela-net:
    external: true
