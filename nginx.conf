events {}

http {
    include /etc/nginx/mime.types;
    server_tokens off;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        client_max_body_size 50m;

        set $profile_identity_backend http://profile-identity-web:8002;
        set $social_consensus_backend http://social-consensus-web:8000;
        set $search_engine_backend http://search-engine-backend:8001;

        root /usr/share/nginx/html;
        index index.html;
        autoindex off;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-hashes' 'sha256-ugCypV+0vdZhfsFJJPpwUcqE54KBTg/rrjVD9+cVcfo='; script-src-attr 'unsafe-hashes' 'sha256-ugCypV+0vdZhfsFJJPpwUcqE54KBTg/rrjVD9+cVcfo='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: http: https:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /_auth_identity {
            internal;
            proxy_pass $profile_identity_backend/internal/auth/validate-token/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        location ~ ^/api/(token|token/refresh|register)/?$ {
            proxy_pass $profile_identity_backend;
        }

        location ~ ^/api/logout/?$ {
            proxy_pass $profile_identity_backend;
        }

        location ~ ^/api/auth/mfa/(setup|confirm|verify|status)/?$ {
            proxy_pass $profile_identity_backend;
        }

        location ~ ^/api/profile-information/?$ {
            auth_request /_auth_identity;
            auth_request_set $auth_user_id $upstream_http_x_authenticated_user_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authenticated-User-Id $auth_user_id;
            proxy_pass $profile_identity_backend;
        }

        location ~ ^/api/profile-information/[^/]+/?$ {
            proxy_pass $profile_identity_backend;
        }

        location ~ ^/api/(users|groups|test/user/groups|test/users/groups)(/.*)?$ {
            auth_request /_auth_identity;
            auth_request_set $auth_user_id $upstream_http_x_authenticated_user_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authenticated-User-Id $auth_user_id;
            proxy_pass $profile_identity_backend;
        }

        location /api/v1/ {
            proxy_pass $social_consensus_backend;
        }

        location /api-se/ {
            proxy_pass $search_engine_backend;
        }

        location /ws/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass $social_consensus_backend;
        }

        location ^~ /media/profile_pictures/ {
            proxy_pass $profile_identity_backend;
        }

        location ^~ /media/ {
            proxy_pass $social_consensus_backend;
        }

        location /api/ {
            proxy_pass $social_consensus_backend;
        }

        location ~* /\.(git|svn|hg|bzr)(/|$) {
            return 404;
        }

        location ~* (^|/)(CVS|\.DS_Store|\.env|\.env\..*|\.htpasswd|\.htaccess|\.bash_history|\.sh_history|\.mysql_history|\.psql_history|\.sqlite_history)$ {
            return 404;
        }

        location ~* \.(bak|backup|old|orig|save|swp|tmp|sql|sqlite|db)$ {
            return 404;
        }

        location ~* (^|/)(users|accounts|credentials|passwords|secrets|tokens)\.json$ {
            return 404;
        }

        location ~* \.(css|js|mjs|map|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
