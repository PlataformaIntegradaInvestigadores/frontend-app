events {}

http {
    include /etc/nginx/mime.types;

    upstream profile_identity_backend {
        server host.docker.internal:8002;
    }

    upstream social_consensus_backend {
        server host.docker.internal:8000;
    }

    upstream search_engine_backend {
        server host.docker.internal:8001;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        client_max_body_size 50m;

        root /usr/share/nginx/html;
        index index.html;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /_auth_identity {
            internal;
            proxy_pass http://profile_identity_backend/internal/auth/validate-token/;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        location ~ ^/api/(token|token/refresh|register)/?$ {
            proxy_pass http://profile_identity_backend;
        }

        location ~ ^/api/logout/?$ {
            proxy_pass http://profile_identity_backend;
        }

        location ~ ^/api/profile-information/?$ {
            auth_request /_auth_identity;
            auth_request_set $auth_user_id $upstream_http_x_authenticated_user_id;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authenticated-User-Id $auth_user_id;
            proxy_pass http://profile_identity_backend;
        }

        location ~ ^/api/profile-information/[^/]+/?$ {
            proxy_pass http://profile_identity_backend;
        }

        location ~ ^/api/(users|groups|test/user/groups|test/users/groups)(/.*)?$ {
            auth_request /_auth_identity;
            auth_request_set $auth_user_id $upstream_http_x_authenticated_user_id;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authenticated-User-Id $auth_user_id;
            proxy_pass http://profile_identity_backend;
        }

        location /api/v1/ {
            proxy_pass http://social_consensus_backend;
        }

        location /api-se/ {
            proxy_pass http://search_engine_backend;
        }

        location /ws/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_pass http://social_consensus_backend;
        }

        location /media/profile_pictures/ {
            proxy_pass http://profile_identity_backend;
        }

        location /media/ {
            proxy_pass http://social_consensus_backend;
        }

        location /api/ {
            proxy_pass http://social_consensus_backend;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
