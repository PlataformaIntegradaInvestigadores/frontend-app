name: "CD — frontend-app → Producción"

on:
  push:
    branches: [main]

jobs:
  # ── Tests Angular ────────────────────────────────────────────────────────
  test:
    name: Pruebas unitarias (Karma/Jasmine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
      - name: Instalar Chromium
        run: sudo apt-get install -y chromium-browser
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar tests
        env:
          CHROME_BIN: /usr/bin/chromium-browser
        run: |
          npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox \
            --no-progress --code-coverage
      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-prod
          path: coverage/

  # ── Deploy producción ────────────────────────────────────────────────────
  deploy-production:
    name: Deploy a servidor producción
    runs-on: [self-hosted, production]
    needs: test
    steps:
      - name: Actualizar código
        run: |
          cd /opt/centinela/frontend-app
          git fetch origin main
          git reset --hard origin/main

      - name: Reconstruir contenedor
        run: |
          cd /opt/centinela
          docker compose up -d --build angular-app

      - name: Health check con rollback automático
        run: |
          sleep 15
          HEALTHY=false
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8082 || echo "000")
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then
              HEALTHY=true; break
            fi
            sleep 6
          done
          if [ "$HEALTHY" = "false" ]; then
            echo "Health check fallido — rollback al commit anterior"
            cd /opt/centinela/frontend-app && git reset --hard HEAD~1
            cd /opt/centinela && docker compose up -d --build angular-app
            exit 1
          fi
          echo "Deploy exitoso — frontend-app en producción"
